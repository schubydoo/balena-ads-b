name: "Build and Deploy (experimental)"

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  pr-test:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/build-and-deploy-balena-impl.yml
    with:
      balena_environment: balena-cloud.com
      platforms: linux/amd64,linux/arm64,linux/arm/v7
      fleet_mapping: |
        linux/amd64: ${{ vars.BALENA_TEST_FLEET_AMD64 }}
        linux/arm64: ${{ vars.BALENA_TEST_FLEET_ARM64 }}
        linux/arm/v7: ${{ vars.BALENA_TEST_FLEET_ARMV7 }}
    secrets:
      BALENA_DEPLOY_API_KEY: ${{ secrets.BALENA_DEPLOY_API_KEY }}

  master-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    uses: ./.github/workflows/build-and-deploy-balena-impl.yml
    with:
      balena_environment: balena-cloud.com
      platforms: linux/amd64,linux/arm64,linux/arm/v7
      fleet_mapping: |
        linux/amd64: ${{ vars.BALENA_PROD_FLEET_AMD64 }}
        linux/arm64: ${{ vars.BALENA_PROD_FLEET_ARM64 }}
        linux/arm/v7: ${{ vars.BALENA_PROD_FLEET_ARMV7 }}
    secrets:
      BALENA_DEPLOY_API_KEY: ${{ secrets.BALENA_DEPLOY_API_KEY }}
