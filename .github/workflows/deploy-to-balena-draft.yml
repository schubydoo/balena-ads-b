name: "Deploy to Balena - Draft"

on:
  workflow_dispatch:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  build:
    name: "Deploy-to-Balena-Draft"
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        architecture: ["aarch64", "amd64", "armv7hf"] # Not supported, but valid: rpi, i386, i386-nlp
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          submodules: 'recursive'

      - name: Build on Balena with ${{ matrix.architecture }} architecture
        uses: balena-io/deploy-to-balena-action@60c9255a5329ffa07e0313b155491dc393a97fb9 # v2.1.0
        with:
          balena_token: ${{ secrets.BALENA_DRAFT_API_KEY }}
          fleet: ${{ vars.BALENA_DRAFT_FLEET }}-${{ matrix.architecture }}
          multi_dockerignore: true
