name: Mirror OpenSky package file

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 'master'

      - name: Download Package File
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          timeout_minutes: 2
          max_attempts: 5
          retry_wait_seconds: 30
          command: |
            aria2c \
              --connect-timeout=20 \
              --timeout=30 \
              --max-tries=3 \
              --retry-wait=10 \
              --lowest-speed-limit=1K \
              -x 2 \
              -o opensky-network/.Packages \
              https://s3.opensky-network.org/website-public-repos/debian/dists/opensky/custom/binary-arm64/Packages

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: Update OpenSky Package file
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          base: master
          branch: bot/update-opensky-package-file
          delete-branch: true
          title: Update OpenSky Package file
          body: Update OpenSky Package file to the latest version.
          add-paths: opensky-network/.Packages

  keepalive-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 'master'

      - name: Update check time
        run: echo $(date -u) > '.github/update-check-time.txt'
        shell: bash

      - name: Push latest check time
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: Update latest version check time
          branch: bot/keepalive-update-check
          create_branch: true
          push_options: '--force'
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          file_pattern: '.github/update-check-time.txt'
  
