# Always loaded. Feature fragments add their own pipeline under
# service.pipelines (e.g. metrics/docker, metrics/host, metrics/dump1090,
# logs/journald). Each fragment's pipeline uses a distinct name to avoid
# OTel's deep-merge replacing receivers lists. See
# https://github.com/open-telemetry/opentelemetry-collector/issues/8754

extensions:
  health_check:
    endpoint: 127.0.0.1:13133

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

  resourcedetection/system:
    detectors: [env, system]
    timeout: 5s
    override: false

  resource/balena:
    # service.namespace is intentionally not set — Grafana Cloud's
    # OTLP→Prometheus translator concatenates it into the `job` label and
    # breaks prebuilt dashboard filters.
    attributes:
      - { key: balena.device_uuid,    value: "${env:BALENA_DEVICE_UUID}",          action: upsert }
      - { key: balena.app_id,         value: "${env:BALENA_APP_ID}",               action: upsert }
      - { key: balena.app_name,       value: "${env:BALENA_APP_NAME}",             action: upsert }
      - { key: balena.device_name,    value: "${env:BALENA_DEVICE_NAME_AT_INIT}",  action: upsert }
      - { key: balena.device_type,    value: "${env:BALENA_DEVICE_TYPE}",          action: upsert }
      - { key: balena.host_os_version,value: "${env:BALENA_HOST_OS_VERSION}",      action: upsert }

  resource/docker:
    # Short UUID for friendlier Grafana variable dropdowns. No-op on
    # non-container metrics that lack container_device_uuid.
    attributes:
      - key: container_device_uuid
        pattern: "^(?P<container_device_short_uuid>.{0,7}).*"
        action: extract

  transform/promote_container_attrs:
    # Copy resource attrs onto data points so they survive as Prometheus
    # labels (Grafana Cloud's OTLP→Prom translator only auto-promotes a
    # small allow-list; the rest get parked in target_info).
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["container_service_name"],      resource.attributes["container_service_name"])      where resource.attributes["container_service_name"] != nil
          - set(attributes["container_device_uuid"],       resource.attributes["container_device_uuid"])       where resource.attributes["container_device_uuid"] != nil
          - set(attributes["container_device_short_uuid"], resource.attributes["container_device_short_uuid"]) where resource.attributes["container_device_short_uuid"] != nil

  transform/logs:
    # Per-record service.name + replace the journald map body with just the
    # MESSAGE string. service.name is written to the LOG RECORD attributes
    # (not resource.attributes): the journald receiver delivers every entry
    # from a poll under ONE shared resource, so a `context: log` statement
    # that writes resource.attributes clobbers the whole group with the last
    # record's value — cross-tagging interleaved containers (e.g. fr24feed
    # lines stamped service_name=autohupr). groupbyattrs/logs below then
    # hoists this record attribute to a per-service resource so Grafana
    # Cloud's OTLP→Loki translator promotes it to the `service_name` stream
    # label. Other journald fields (PRIORITY, _SYSTEMD_UNIT, …) stay in the
    # body's siblings until the final set(body, body["MESSAGE"]) strips them
    # — keep the LogQL text search (`|= "…"`) for everything we don't promote.
    log_statements:
      - context: log
        statements:
          - set(attributes["service.name"], body["CONTAINER_NAME"]) where IsMap(body) and body["CONTAINER_NAME"] != nil
          # Strip balena's "_<release>_<service_id>_<image_hash>" suffix.
          - set(attributes["service.name"], Split(attributes["service.name"], "_")[0]) where attributes["service.name"] != nil and IsMatch(attributes["service.name"], "_")
          - set(attributes["service.name"], body["_SYSTEMD_UNIT"]) where IsMap(body) and body["CONTAINER_NAME"] == nil and body["_SYSTEMD_UNIT"] != nil
          - set(body, body["MESSAGE"]) where IsMap(body) and body["MESSAGE"] != nil

  groupbyattrs/logs:
    # Split the journald receiver's single shared ResourceLogs into one
    # resource per distinct service.name, hoisting that record attribute to
    # the resource level. This is what makes per-record service.name correct:
    # without it, all entries in a batch share one resource and the last
    # record's service.name wins for the whole group. Existing resource attrs
    # (balena.*, host detection) are carried into each split group. Records
    # with no service.name (no CONTAINER_NAME and no _SYSTEMD_UNIT) group
    # together unlabelled, surfacing as Loki's `unknown_service`.
    keys: [service.name]

exporters:
  otlp_http:
    endpoint: "${env:OTLP_ENDPOINT}"
    # Headers are populated at runtime via /tmp/otel-headers.yaml (built by
    # start.sh from OTLP_AUTH_HEADER + OTLP_HEADERS). Empty placeholder here
    # so non-Authorization-only backends (Honeycomb, Datadog, New Relic, …)
    # don't ship an empty Authorization header on every request.
    headers: {}
    compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 100

service:
  extensions: [health_check]
  pipelines: {}   # feature fragments add metrics/* and logs/* entries here
  telemetry:
    logs:
      level: info
