# Loaded when OTEL_NODE_METRICS_ENABLED=true. Scrapes the in-container
# node_exporter (started by start.sh on loopback) so the metrics arrive
# under job=integrations/node_exporter — what Grafana Cloud's prebuilt
# Linux Server dashboards filter on.

receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: integrations/node_exporter
          scrape_interval: "${env:OTEL_COLLECTION_INTERVAL}"
          static_configs:
            - targets: ['127.0.0.1:9100']
          relabel_configs:
            - source_labels: [__address__]
              replacement: "${env:NODE_EXPORTER_INSTANCE}"
              target_label: instance

processors:
  resource/host_container_id:
    # Stamp host metrics with the same container_device_uuid the docker_stats
    # pipeline carries, so the shared resource/docker processor can derive
    # container_device_short_uuid here too. Net effect: node_exporter and
    # docker_stats series end up labelled with the same short UUID, and the
    # bundled dashboard can filter both metric families on a single variable
    # without making instance match container_device_short_uuid (which would
    # break stock Grafana Cloud Linux Server dashboards' hostname display).
    attributes:
      - { key: container_device_uuid, value: "${env:BALENA_DEVICE_UUID}", action: upsert }

service:
  pipelines:
    metrics/host:
      receivers: [prometheus]
      processors: [resourcedetection/system, resource/balena, resource/host_container_id, resource/docker, transform/promote_container_attrs, batch]
      exporters: [otlp_http]
